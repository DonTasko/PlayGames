<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slots Demo Grátis — Jogos Demo dos Melhores Fornecedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090e;
    --surface: #111118;
    --card: #14141c;
    --border: #252535;
    --gold: #f0c040;
    --gold2: #e8a820;
    --accent: #ff6b35;
    --text: #e8e8f0;
    --muted: #5a5a78;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(9,9,14,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 60px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-decoration: none;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .logo span { color: var(--text); opacity: 0.7; }

  .search-wrap {
    flex: 1;
    max-width: 380px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 1rem 0.45rem 2.4rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap svg {
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .header-count {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
    flex-shrink: 0;
  }
  .header-count strong { color: var(--gold); }

  /* HERO */
  .hero {
    text-align: center;
    padding: 2.5rem 1.5rem 1rem;
    background: radial-gradient(ellipse 100% 80% at 50% -10%, rgba(240,192,64,0.06) 0%, transparent 60%);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    letter-spacing: 5px;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(240,192,64,0.2);
    margin-bottom: 0.4rem;
  }
  .hero p { color: var(--muted); font-size: 0.9rem; }

  /* FILTERS */
  .filters-bar {
    max-width: 1400px;
    margin: 1.25rem auto 0;
    padding: 0 1.5rem 1.25rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-right: 0.25rem;
    flex-shrink: 0;
  }
  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0.9rem;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--gold); color: var(--text); }
  .pill.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }

  /* MAIN */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--muted);
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* GRID */
  #games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.9rem;
  }

  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .game-card:hover {
    transform: translateY(-3px);
    border-color: rgba(240,192,64,0.5);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(240,192,64,0.15);
  }

  .thumb-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: var(--surface);
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .game-card:hover .thumb-wrap img { transform: scale(1.05); }

  .thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .game-card:hover .play-overlay { opacity: 1; }
  .play-btn-sm {
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 999px;
    padding: 0.45rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .game-info {
    padding: 0.55rem 0.7rem 0.6rem;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .game-name {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .game-provider {
    font-size: 0.7rem;
    color: var(--gold);
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .empty .emoji { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* MODAL */
  #modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 0.75rem;
  }
  #modal-backdrop.open { display: flex; }

  #modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 1000px;
    height: 92vh;
    max-height: 680px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.9);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.96) translateY(8px); opacity: 0; }
    to   { transform: scale(1)    translateY(0);   opacity: 1; }
  }

  #modal-header {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    gap: 0.75rem;
    flex-shrink: 0;
  }
  #modal-thumb {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }
  .modal-titles { flex: 1; min-width: 0; }
  #modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--gold);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #modal-subtitle { font-size: 0.75rem; color: var(--muted); }

  #modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #modal-close:hover { border-color: #e84040; color: #e84040; }

  #game-frame {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
    background: #000;
  }

  /* FOOTER */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    text-align: center;
    font-size: 0.74rem;
    color: var(--muted);
    line-height: 1.6;
  }
  footer a { color: var(--gold); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    #games-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.6rem; }
    .header-inner { gap: 0.75rem; }
    .search-wrap { max-width: none; }
    .hero h1 { letter-spacing: 3px; }
  }
</style>
</head>

  { id: 9091,  name: "Rich Wilde Tome of Madness", provider: "Play'n GO",       thumb: "https://assets.slotslaunch.com/9091/tome-of-madness.jpg" },

  // PEARFICTION

  // NAILED IT GAMES

  // BULLSHARK

  // GOLD COIN STUDIOS

  // TADA GAMING
  { id: 11356, name: "Super Ace",                  provider: "TaDa Gaming",     thumb: "https://assets.slotslaunch.com/11356/552x380_EN_GAMEID_49.png" },
  { id: 16326, name: "Fortune Gems 2",             provider: "TaDa Gaming",     thumb: "https://assets.slotslaunch.com/16326/fortune-gems-2.jpg" },
];

let filtered = [...GAMES];
let activeProvider = '';
let searchTerm = '';

function applyFilters() {
  filtered = GAMES.filter(g => {
    const mp = !activeProvider || g.provider === activeProvider;
    const ms = !searchTerm || g.name.toLowerCase().includes(searchTerm) || g.provider.toLowerCase().includes(searchTerm);
    return mp && ms;
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('games-grid');
  const label = document.getElementById('results-label');
  const counter = document.getElementById('count-display');

  counter.textContent = filtered.length;
  label.textContent = activeProvider
    ? `${activeProvider} — ${filtered.length} jogos`
    : `Todos os fornecedores — ${filtered.length} jogos`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="emoji">🔍</div><p>Nenhum jogo encontrado.<br>Tenta outro filtro ou pesquisa.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(g => `
    <div class="game-card" onclick="openGame(${g.id},'${esc(g.name)}','${esc(g.provider)}','${esc(g.thumb)}')">
      <div class="thumb-wrap">
        <img src="${esc(g.thumb)}" alt="${esc(g.name)}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="thumb-placeholder" style="display:none">🎰</div>
        <div class="play-overlay"><button class="play-btn-sm">▶ Jogar</button></div>
      </div>
      <div class="game-info">
        <div class="game-name">${esc(g.name)}</div>
        <div class="game-provider">${esc(g.provider)}</div>
      </div>
    </div>`).join('');
}

function openGame(id, name, provider, thumb) {
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-subtitle').textContent = provider;
  document.getElementById('modal-thumb').src = thumb;
  document.getElementById('game-frame').src = `https://slotslaunch.com/iframe/${id}?token=${TOKEN}`;
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('game-frame').src = '';
  document.body.style.overflow = '';
}

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    activeProvider = this.dataset.provider;
    applyFilters();
  });
});

document.getElementById('search-input').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase().trim();
  applyFilters();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Init
renderGrid();
</script>
